[pytest]
# Put the project root on sys.path so tests can import top-level modules
# (models, dnd_api, i18n) regardless of how pytest is invoked. Without this,
# the bare `pytest` command (unlike `python -m pytest`) does not add the
# project root to sys.path, breaking imports under external test runners.
pythonpath = .
markers =
    integration: marks tests as integration tests (slow, requires API access)

